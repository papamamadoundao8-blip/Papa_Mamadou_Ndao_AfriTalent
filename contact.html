</head>

<body>
   <header>
      <nav class="navbar navbar-expand-lg bg-light fixed-top">
         <div class="container-fluid">
            <img src="Images/logoAFT.jpg" alt="">
            <!-- La class collapse navbar-collapse permet de faciliter le regroupage des liens de navigation sur des ecrans plus petit en menu amburgur comme les telephones -->

               <ul class="navbar-nav ms-auto">
                  <li><a class="nav-link " href="index.html">Accueil</a></li>
                  <li><a class="nav-link" href="freelances.html">Freelances</a></li>
                  <li><a class="nav-link" href="tarifs.html">Tarifs</a></li>
                  <li><a class="nav-link" href="about.html">A propos</a></li>
                  <li><a class="nav-link" href="contact.html">Contact</a></li>
                  
               </ul>
               <a href="" class="btn btn-primary ms-lg-3">Rejoindre AfriTalent</a>
            </div>
         </div>
      </nav>
   </header>
   <main class="mt-5 pt-5">
      <div class="container py-5">
         <div class="row g-5">

            <div class="col-lg-7">
               <div class="bg-white p-5 ">
                  <h2 class="fw-bold mb-4">Envoyez-nous un message</h2>
                  <form>
                     <div class="row g-3">
                        <div class="col-md-6">
                           <label class="form-label">Nom</label>
                           <input type="text" class="form-control" required>

                        </div>
                        <div class="col-md-6">
                           <label for=""> Prénom</label>
                           <input type="text " class="form-control" required>
                        </div>
                     </div>
                     <div class="mt-3">
                        <label class="form-label">Email</label>
                        <input type="email" class="form-control" required>
                     </div>
                     <div class="mt-3">
                        <p>Profession</p>
                        <select class=" form-control required">
                           <option>Veillez choisir </option>
                           <option>Recruteur</option>
                           <option>Devenir Freelance</option>
                           <option>Freelance</option>
                        </select>
                     </div>
                     <div class="mt-3">
                        <label for="">Message</label>
                        <textarea class="form-control" required></textarea>
                        <small class="text-muted">Minimum 50 caractères.</small>
                     </div>             
                     <button type="submit" class="btn btn-primary">
                        Envoyer les message
                     </button>
                  </form>
               </div>
            </div>

            <div class="col-lg-5">
               <h3 class="mb-4">Nos coordonnées</h3>
               <p><i class=" me-2"></i> 123 Avenue Blaise Diagne</p>
               <p>+221 33 800 00 00</p>

               <div class="mt-4">
                  <iframe
                     src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d15438.4556481137!2d-17.447547!3d14.6937!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x0%3A0x0!2zMTTCsDQxJzM3LjMiTiAxN8KwMjYnNTEuMiJX!5e0!3m2!1sfr!2ssn!4v1620000000000!5m2!1sfr!2ssn"
                     width="100%" height="350">
                  </iframe>
               </div>
            </div>
         </div>
      </div>
   </main>
   <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
   <script src="Js/main.js"></script>


</body>

</html>
