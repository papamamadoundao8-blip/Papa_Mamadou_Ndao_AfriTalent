   <main class="dContact" >
      <div class="contacts">
         <div class="contact-form mt-5 pt-5">
            <h2 class="text-light">Envoyez un message</h2>
            <form >
               <div class="group">
                  <label for="last-name">Nom</label>
                  <input type="text" id="last-name" name="last-name" placeholder="Votre nom" class="bg-dark">
                  
               </div>

               <div class="group">
                  <label for="first-name">Prénom</label>
                  <input type="text" placeholder="Votre prénom" class="bg-dark">

               </div>

               <div class="group">
                  <label for="email">Email</label>
                  <input type="email" id="email" name="email" placeholder="Donnez votre email" class="bg-dark">

               </div>

               <div class="group">
                  <label for="subject">Sujet</label>
                  <select id="subject" name="subject" class="bg-dark">
                     <option value="" class="text-light">Sélectionnez un sujet</option>
                     <option value="support">Je suis freelance</option>
                     <option value="sales">Je cherche un freelance</option>
                     <option value="other">Autre</option>
                  </select>
               </div>

               <div class="group">
                  <label for="message">Message</label>
                  <textarea id="" name="" placeholder="Minimum 20 caractéres" class="bg-dark"></textarea>
               </div>
               <button type="submit" class="btn btn-primary">Envoyer</button>
               <button type="reset" class="btn btn-outline-primary">Annuler</button>
            </form>
         </div>

         <div class="mt-5 pt-5">
            <div  >
               <h3 class="text-light">Nos coordonnées</h3>
               <p class="text-light"><strong>Email :</strong> contact@AfriTalent.com</p>
               <p class="text-light"><strong>Téléphone :</strong> +223 123 45 67</p>
               <p class="text-light"><strong>Adresse :</strong> 14 Rue Mobutu Maduéké, 65000 Yamoussouko</p>
            </div>

            <div>
               <iframe
                  src="https://www.google.com/maps/embed?pb=!1m18!1m12!1m3!1d2624.9916256937595!2d2.2922926156743895!3d48.85837007928746!2m3!1f0!2f0!3f0!3m2!1i1024!2i768!4f13.1!3m3!1m2!1s0x47e66e2964e34e2d%3A0x8ddca97e440cf648!2sTour%20Eiffel!5e0!3m2!1sfr!2sfr!4v1614123456789!5m2!1sfr!2sfr"
                  width="100%" height="250" style="border:0;" allowfullscreen="" loading="lazy">

            </div>
